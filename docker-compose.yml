services:
  postgres:
    image: postgres:16-alpine
    container_name: elist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: elist
      POSTGRES_USER: elist
      POSTGRES_PASSWORD: elist
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elist -d elist"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elist-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
